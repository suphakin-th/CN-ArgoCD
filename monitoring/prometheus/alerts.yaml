apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: fintech-platform-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: go-service
      interval: 30s
      rules:
        - alert: GoServiceHighErrorRate
          expr: |
            rate(grpc_requests_total{status!="ok"}[5m])
            / rate(grpc_requests_total[5m]) > 0.05
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "go-service gRPC error rate > 5%"
            description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

        - alert: GoServiceDown
          expr: up{job="go-service"} == 0
          for: 1m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "go-service is down"
            description: "go-service scrape target has been down for more than 1 minute."

        - alert: GoServiceHighLatency
          expr: |
            histogram_quantile(0.99,
              rate(grpc_request_duration_seconds_bucket[5m])
            ) > 1.0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "go-service p99 latency > 1s"
            description: "p99 latency is {{ $value | humanizeDuration }}."

    - name: kubernetes-cluster
      rules:
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"

        - alert: NodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} has disk pressure"

        - alert: HighCPUUsage
          expr: |
            (sum by(node) (rate(node_cpu_seconds_total{mode!="idle"}[5m]))
             / sum by(node) (rate(node_cpu_seconds_total[5m]))) > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} CPU > 90%"
            description: "CPU utilization is {{ $value | humanizePercentage }}."
