tempo:
  reportingEnabled: false
  metricsGenerator:
    enabled: true
    remoteWriteUrl: http://prometheus-operated:9090/api/v1/write

  storage:
    trace:
      backend: gcs
      gcs:
        bucket_name: cn-fintech-tempo-traces

  retention: 168h  # 7 days

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    zipkin:
      endpoint: 0.0.0.0:9411
    jaeger:
      protocols:
        grpc:
          endpoint: 0.0.0.0:14250
        thrift_http:
          endpoint: 0.0.0.0:14268

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

serviceAccount:
  annotations:
    iam.gke.io/gcp-service-account: monitoring-prod@cn-fintech-gke.iam.gserviceaccount.com
