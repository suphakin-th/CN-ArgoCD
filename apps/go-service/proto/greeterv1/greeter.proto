syntax = "proto3";

package greeter.v1;

option go_package = "github.com/suphakin-th/CN-ArgoCD/apps/go-service/proto/greeterv1";

service GreeterService {
  rpc SayHello(HelloRequest) returns (HelloResponse);
  rpc GetStatus(StatusRequest) returns (StatusResponse);
}

message HelloRequest {
  string name     = 1;
  string trace_id = 2;
}

message HelloResponse {
  string message   = 1;
  string service   = 2;
  string version   = 3;
  int64  timestamp = 4;
}

message StatusRequest {}

message StatusResponse {
  string status  = 1;
  string version = 2;
  int64  uptime  = 3;
}
