apiVersion: v1
kind: Service
metadata:
  name: python-service
  namespace: apps
  labels:
    app: python-service
spec:
  selector:
    app: python-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: python-service-pdb
  namespace: apps
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: python-service
